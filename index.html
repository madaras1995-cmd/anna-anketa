<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#34C759">
<title>Анкета здоровья · Анна Нетреба</title>
<style>
  :root{
    --green:#34C759; --green-d:#2AA149; --teal:#30B0C7; --mint:#63E6BE;
    --bg:#F2F2F7; --card:#FFFFFF; --ink:#1C1C1E; --sub:#8E8E93; --line:#E5E5EA;
    --red:#FF3B30; --amber:#FF9F0A; --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
    --safe:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  .app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(96px + var(--safe))}
  /* HERO */
  .hero{background:linear-gradient(160deg,var(--green) 0%,var(--teal) 100%);color:#fff;
    padding:46px 20px 22px;border-radius:0 0 26px 26px}
  .hero h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.5px}
  .hero p{margin:5px 0 0;opacity:.92;font-size:14px;font-weight:500;line-height:1.4}
  .pbar{height:7px;background:rgba(255,255,255,.28);border-radius:8px;margin-top:16px;overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:#fff;border-radius:8px;transition:.35s}
  .pmeta{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;font-weight:700;opacity:.95}
  /* CONTENT */
  .wrap{padding:16px}
  .btitle{font-size:12px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 2px}
  .bh{font-size:21px;font-weight:800;letter-spacing:-.4px;margin:2px 2px 12px}
  .intro{background:#EAF7EE;color:#1f6b3a;border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:14px}
  .card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .q{font-size:15.5px;font-weight:700;line-height:1.35;margin:0 0 12px;letter-spacing:-.2px}
  .q .req{color:var(--red)}
  .sec-lbl{font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin:20px 4px 8px}
  .sec-lbl:first-child{margin-top:2px}
  /* inputs */
  input.f,textarea.f{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;
    font-size:16px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:.15s}
  input.f:focus,textarea.f:focus{border-color:var(--green)}
  textarea.f{min-height:78px;resize:vertical;line-height:1.4}
  .unit{color:var(--sub);font-size:13px;font-weight:600;margin-left:6px}
  /* option rows */
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:12px;
    padding:12px 14px;font-size:15px;font-weight:600;cursor:pointer;background:#fff;transition:.12s;line-height:1.3}
  .opt .bx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;font-size:14px;color:#fff;transition:.12s}
  .opt.rad .bx{border-radius:50%}
  .opt.sel{border-color:var(--green);background:#F1FBF4}
  .opt.sel .bx{background:var(--green);border-color:var(--green)}
  .opt.sel .bx::after{content:"✓"}
  /* scale 0-1-2 */
  .s012{display:flex;gap:8px;margin-top:4px}
  .s012 button{flex:1;height:46px;border:1.5px solid var(--line);border-radius:12px;background:#fff;
    font-size:16px;font-weight:800;color:var(--sub);cursor:pointer;transition:.12s}
  .s012 button.sel{color:#fff;transform:scale(1.03)}
  .s012 button.v0.sel{background:var(--green);border-color:var(--green)}
  .s012 button.v1.sel{background:var(--amber);border-color:var(--amber)}
  .s012 button.v2.sel{background:var(--red);border-color:var(--red)}
  .s012lab{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);font-weight:600;margin-top:6px}
  /* scale 1-10 */
  .s10{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .s10 button{width:calc(20% - 6px);height:44px;border:1.5px solid var(--line);border-radius:11px;background:#fff;
    font-size:15px;font-weight:800;color:var(--sub);cursor:pointer;transition:.12s}
  .s10 button.sel{background:linear-gradient(160deg,var(--green),var(--teal));color:#fff;border-color:transparent;transform:scale(1.04)}
  .otherwrap{margin-top:8px;display:none}.otherwrap.show{display:block}
  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;
    background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-top:1px solid var(--line);
    display:flex;gap:10px;padding:12px 16px calc(12px + var(--safe));z-index:50}
  .nav button{flex:1;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s}
  .nav .back{flex:0 0 46%;background:var(--bg);color:var(--ink)}
  .nav .next{background:linear-gradient(160deg,var(--green),var(--green-d));color:#fff;box-shadow:0 6px 16px rgba(52,199,89,.32)}
  .nav button:active{transform:scale(.98)}
  .nav button:disabled{opacity:.45}
  .saved{position:fixed;bottom:calc(84px + var(--safe));left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:9px 18px;border-radius:12px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:.3s;z-index:60}
  .saved.show{opacity:1}
  /* welcome / finish */
  .center{text-align:center;padding:8px 6px}
  .center .big{font-size:52px;margin:6px 0}
  .center h2{font-size:22px;font-weight:800;margin:6px 0}
  .center p{color:var(--sub);font-size:14.5px;line-height:1.5;margin:8px 4px 0}
  .fin-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .fin-actions button{padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer}
  .b-tg{background:#229ED9;color:#fff}.b-copy{background:var(--bg);color:var(--ink)}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1 id="hTitle">Анкета здоровья</h1>
    <p id="hSub">Первичная оценка состояния. Займёт 15–20 минут — можно закрыть и вернуться, ответы сохраняются.</p>
    <div class="pbar"><i id="pbar"></i></div>
    <div class="pmeta"><span id="pLeft">Блок 0 из 11</span><span id="pRight">0%</span></div>
  </div>
  <div class="wrap" id="screen"></div>
</div>
<div class="nav">
  <button class="back" id="btnBack" onclick="prev()">Назад</button>
  <button class="next" id="btnNext" onclick="next()">Начать</button>
</div>
<div class="saved" id="saved">Сохранено ✓</div>

  if(block.intro) h+=`<div class="intro">${esc(block.intro)}</div>`;
  for(const it of block.items){
    if(it.type==='subheader'){h+=`<div class="sec-lbl">${esc(it.text)}</div>`;continue}
    h+=`<div class="card">${renderItem(it)}</div>`;
  }
  el.innerHTML=h;
}

function renderItem(it){
  const q=`<p class="q">${esc(it.q)}</p>`;
  const v=A[it.id];
  if(it.type==='number'||it.type==='text'){
    return q+`<input class="f" type="${it.type==='number'?'number':'text'}" inputmode="${it.type==='number'?'decimal':'text'}" value="${esc(v||'')}" oninput="setV('${it.id}',this.value)">`;
  }
  if(it.type==='textarea'){
    return q+`<textarea class="f" oninput="setV('${it.id}',this.value)">${esc(v||'')}</textarea>`;
  }
  if(it.type==='scale012'){
    const cur=v;const b=n=>`<button class="v${n} ${String(cur)===String(n)?'sel':''}" onclick="setV('${it.id}',${n});render()">${n}</button>`;
    return q+`<div class="s012">${b(0)}${b(1)}${b(2)}</div>
      <div class="s012lab"><span>нет</span><span>иногда</span><span>часто</span></div>`;
  }
  if(it.type==='scale10'){
    let b='';for(let n=1;n<=10;n++)b+=`<button class="${String(v)===String(n)?'sel':''}" onclick="setV('${it.id}',${n});render()">${n}</button>`;
    return q+`<div class="s10">${b}</div><div class="s012lab"><span>1 — пока нет</span><span>10 — полностью готова</span></div>`;
  }
  if(it.type==='single'||it.type==='multi'){
    const multi=it.type==='multi';const rad=multi?'':'rad';
    const arr=multi?(Array.isArray(v)?v:[]):null;
    let h='<div class="opts">';
    it.options.forEach((o,i)=>{
      const sel=multi?arr.includes(o):(v===o);
      h+=`<div class="opt ${rad} ${sel?'sel':''}" onclick="pick('${it.id}',${i},${multi})"><span class="bx"></span><span>${esc(o)}</span></div>`;
    });
    h+='</div>';
    if(it.other){
      const ov=A[it.id+'_other']||'';const showOther=multi?arr.some(x=>/друг/i.test(x)):/друг/i.test(v||'');
      h+=`<div class="otherwrap ${showOther?'show':''}" id="ow_${it.id}"><input class="f" placeholder="Уточните…" value="${esc(ov)}" oninput="A['${it.id}_other']=this.value;save()"></div>`;
    }
    return q+h;
  }
  return q;
}

function setV(id,val){A[id]=val;save();updateProgress()}
function pick(id,idx,multi){
  const it=findItem(id);const o=it.options[idx];
  if(multi){let arr=Array.isArray(A[id])?A[id].slice():[];const p=arr.indexOf(o);if(p>=0)arr.splice(p,1);else arr.push(o);A[id]=arr;}
  else{A[id]=(A[id]===o)?'':o;}
  save();render();
}
function findItem(id){for(const s of SCHEMA)for(const it of s.items)if(it.id===id)return it;return null}

function next(){
  if(step===0){const n=(A.__name||'').trim();if(!n){alert('Пожалуйста, укажите имя');return}}
  if(step<MAX){step++;save();render();}
}
function prev(){if(step>0){step--;save();render();}}

/* === СБОРКА ОТВЕТОВ === */
function buildRows(){
  const headers=['Время','Имя'];const cols=[new Date().toLocaleString('ru-RU'),A.__name||''];
  for(const s of SCHEMA)for(const it of s.items){
    if(it.type==='subheader')continue;
    headers.push(it.q);
    cols.push(fmt(it));
  }
  return {headers,cols};
}
function fmt(it){
  const v=A[it.id];
  if(v===undefined||v==='')return '';
  if(Array.isArray(v)){let s=v.join('; ');const ot=A[it.id+'_other'];if(ot&&/друг/i.test(s))s+=' ('+ot+')';return s;}
  if((it.type==='single')&&it.other&&/друг/i.test(v)){const ot=A[it.id+'_other'];return v+(ot?' ('+ot+')':'');}
  return String(v);
}
function buildText(){
  const {headers,cols}=buildRows();let t='🌿 Анкета здоровья\n';
  let bi=0;
  for(const s of SCHEMA){t+=`\n— Блок ${s.block}. ${s.title} —\n`;
    for(const it of s.items){if(it.type==='subheader')continue;const a=fmt(it);if(a)t+=`• ${it.q}: ${a}\n`;}}
  return `Имя: ${A.__name||''}\n${t}`;
}

function renderFinish(el){
  const done=answered();
  el.innerHTML=`<div class="center">
    <div class="big">✅</div>
    <h2>Анкета заполнена</h2>
    <p>Отвечено на ${done} из ${TOTAL} вопросов.${done<TOTAL?' Можно вернуться и дополнить пропущенное — кнопка «Назад».':''}</p>
    <p style="margin-top:12px">Нажмите «Отправить» — Ваши ответы придут мне. Спасибо за подробность, это правда важно для точных рекомендаций.</p>
  </div>
  <div class="fin-actions">
    <button class="next" style="color:#fff" onclick="submitAll()">📨 Отправить ответы</button>
    <button class="b-tg" onclick="sendTG()">Отправить через Telegram</button>
    <button class="b-copy" onclick="copyText()">Скопировать ответы текстом</button>
  </div>`;
}
function submitAll(){
  const {headers,cols}=buildRows();
  if(SHEET_URL){
    fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({headers,cols})}).catch(()=>{});
    alert('Спасибо! Ответы отправлены.');
  }else{sendTG();}
}
function sendTG(){
  const t=buildText();
  const done=()=>{if(ANNA_TG)window.open('https://t.me/'+ANNA_TG,'_blank')};
  copyRaw(t,()=>{alert('Ответы скопированы. Откроется чат — вставьте их сообщением.');done()});
}
function copyText(){copyRaw(buildText(),()=>alert('Скопировано. Вставьте в сообщение Анне.'))}
function copyRaw(t,cb){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(cb).catch(()=>fb(t,cb))}else fb(t,cb)}
function fb(t,cb){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);cb()}

render();
</script>
